name: Terraform Infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'plan hoặc apply hoặc destroy'
        required: true
        default: 'plan'
        type: choice
        options: [plan, apply, destroy]

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-southeast-2

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: ${{ github.event.inputs.action == 'apply' }}
        run: terraform apply tfplan

      - name: Lưu EC2 IP vào GitHub Secrets (thủ công sau khi apply)
        if: ${{ github.event.inputs.action == 'apply' }}
        run: |
          echo "=========================================="
          echo "EC2 Public IP: $(terraform output -raw ec2_public_ip)"
          echo "Hãy copy IP trên vào GitHub Secret: PROD_HOST"
          echo "=========================================="

      - name: Tự động trigger CI/CD để deploy app   # 🚀 Auto deploy sau apply
        if: ${{ github.event.inputs.action == 'apply' }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}            # PAT với scope: workflow
        run: |
          gh workflow run ci-cd.yml \
            --repo ${{ github.repository }} \
            --ref main