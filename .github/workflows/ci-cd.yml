name: CI/CD NextJS Docker

on:
  push:
    branches:
      - main
      - develop

env:
  IMAGE_NAME: my-nextjs-app

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: docker build -t $IMAGE_NAME:latest .

      - name: Save Docker Image
        run: docker save $IMAGE_NAME:latest > app.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: app.tar

  # 🚀 DEPLOY PRODUCTION (có approval)
  deploy-production:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production  # 👉 bật approval ở đây

    steps:
      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: SSH deploy production
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            docker load < app.tar
            docker stop app || true
            docker rm app || true

            docker run -d \
              -p 3000:3000 \
              --name app \
              -e NODE_ENV=production \
              -e NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }} \
              $IMAGE_NAME:latest